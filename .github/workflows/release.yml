name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # 版本守門（fail-closed）：tag 必須與 internal/version.Version 一致
      - name: Verify tag matches version.go
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          # [^"]* + 無行尾錨點：對 CRLF 行尾健壯（act 本地驗證會以 CRLF working tree 跑）
          code_version=$(sed -n 's/^const Version = "\([^"]*\)".*/\1/p' internal/version/version.go)
          if [ -z "$code_version" ]; then
            echo "::error::could not extract Version from internal/version/version.go"
            exit 1
          fi
          if [ "$tag_version" != "$code_version" ]; then
            echo "::error::tag v$tag_version does not match internal/version.Version=$code_version"
            exit 1
          fi
          echo "version check ok: $code_version"

      - name: Build binaries
        run: |
          mkdir -p dist
          for os in windows linux darwin; do
            for arch in amd64 arm64; do
              ext=""
              [ "$os" = "windows" ] && ext=".exe"
              echo "building $os/$arch"
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
                go build -trimpath -ldflags "-s -w" \
                -o "dist/apm-go-$os-$arch$ext" ./cmd/apm-go
            done
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
